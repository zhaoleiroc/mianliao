name: Deploy to Cloudflare Pages

# Mirrors .github/workflows/deploy.yml (GitHub Pages) but deploys to CF Pages
# at https://mianliao-1fw.pages.dev/ instead of GitHub Pages. The two deploy
# targets are independent: either can succeed / fail without blocking the
# other. If you only want one of them, delete the other's workflow file.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Distinct from the GH Pages deploy's `pages` group so a slow CF deploy
  # does not block a GH Pages deploy and vice versa.
  group: cf-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install openpyxl

      - name: Re-extract fabric catalogue
        run: python scripts/extract_fabrics.py

      - name: Re-archive images
        run: python scripts/archive_images.py --apply

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm deps
        run: npm ci

      # CF Pages serves the project at the apex (mianliao-1fw.pages.dev/),
      # so vite must NOT prepend /mianliao/ to emitted asset URLs. The
      # DEPLOY_CLOUDFLARE=1 flag in vite.config.ts picks "/" for base.
      - name: Build (apex base, no /mianliao/ prefix)
        env:
          DEPLOY_CLOUDFLARE: "1"
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --commit-dirty=true: CI leaves the tree dirty after running the
        # data pipeline (extract + archive); wrangler would otherwise
        # refuse to deploy with "Working tree changes would be lost".
        # --branch=main is CF Pages' default production branch alias.
        run: npx wrangler pages deploy dist --project-name=mianliao --commit-dirty=true --branch=main
